name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dev dependencies
        run: pip install pytest pytest-cov ruff mypy pyyaml
      - name: ruff lint
        run: ruff check scripts/ tests/
      - name: mypy --strict
        run: mypy scripts/
      - name: pytest + 100% coverage gate
        run: pytest --cov=scripts --cov-report=term-missing

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          # Pinned to 3.12: mutmut<3 does not run on 3.14. Do not let Renovate bump this.
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install pytest pyyaml "mutmut<3"
      # Mutation gate scoped to the dependency-resolution + config core, kept at zero
      # survivors. Expanding the gated set to the remaining logic modules is tracked in
      # the roadmap; presentational/template strings are intentionally not gated.
      - name: mutation testing (no survivors allowed)
        run: |
          set -e
          # Baseline must pass, else mutmut can't run — fail LOUDLY rather than vacuously
          # report "no survivors" off a crashed run (e.g. a missing test dependency).
          python -m pytest -x -q
          mutmut run --paths-to-mutate "scripts/_paths.py,scripts/config.py" 2>&1 | tee mutmut_run.log || true
          # Guard against a crashed run reporting green: a mutmut crash leaves no result
          # data, so the survivor check below would pass vacuously. Catch the crash here.
          if grep -qiE "Traceback|RuntimeError|cannot pickle" mutmut_run.log; then
            echo "::error::mutmut did not run cleanly — the mutation gate is not actually testing:"
            tail -20 mutmut_run.log
            exit 1
          fi
          if mutmut results | grep -q "Survived"; then
            echo "::error::Surviving mutants found — tests do not fully assert behaviour:"
            mutmut results
            exit 1
          fi
          echo "No surviving mutants."
