# mutmut (mutation testing) config. mutmut<3 reads this [mutmut] section.
# Line coverage proves code ran; mutation score proves the tests actually assert behaviour.
# build_board.py is mutated for its logic, but its large embedded HTML/CSS PAGE template is
# presentational data, not logic — string mutations there are expected survivors and are
# covered instead by the render assertions in tests/test_build_board.py.
[mutmut]
paths_to_mutate=scripts/
tests_dir=tests/
runner=python -m pytest -x -q
